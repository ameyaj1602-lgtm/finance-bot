# Render.com deployment config
services:
  - type: web
    name: finance-wiz-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run_all.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PORT
        value: 8080
    plan: free
